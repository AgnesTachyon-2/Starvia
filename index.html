<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIRAYA LEGACY | Growtopia Filipino Server</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --sky-top: #5a9ab7;    
            --sky-mid: #7fb4cc;    
            --sky-bottom: #a3d2e5;
            --card-bg: #1a1d21;
            --card-border: #2d3139;
            --btn-bg: #2a2e35;
            --accent: #fdf28f;
            --text-main: #f8fafc;  
            --text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, var(--sky-top) 0%, var(--sky-mid) 50%, var(--sky-bottom) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::after {
            content: "";
            position: fixed;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            max-width: 90%;
            height: 500px;
            background: url('https://i.imgur.com/your-island-image.png') no-repeat center; 
            background-size: contain;
            z-index: 1;
            pointer-events: none;
            opacity: 0.3;
            animation: float 7s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, 0px); }
            50% { transform: translate(-50%, -15px); }
        }

        .container {
            width: 100%;
            max-width: 580px;
            padding: 3rem 1.5rem;
            position: relative;
            z-index: 10;
        }

        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(1.1rem, 5vw, 1.8rem);
            color: var(--accent);
            text-shadow: var(--text-shadow);
            margin-bottom: 15px;
        }
        .header h3 {
            font-size: 0.85rem;
            font-weight: 700;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #fff;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 1.8rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card h3 {
            color: var(--accent);
            margin-bottom: 1.5rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-grid { display: flex; flex-direction: column; gap: 0.75rem; }
        
        .btn {
            width: 100%;
            padding: 1.1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--btn-bg);
            color: #fff;
            border: 1px solid #3d424b;
            text-align: center;
            font-size: 0.9rem;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .btn:hover { 
            background: #363b44;
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-download {
            background: #2d5a27;
            border: 1px solid #3e7a36;
        }
        .btn-download:hover {
            background: #3e7a36;
        }

        .discord-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #000;
            background: #2f3136;
        }

        .footer { 
            text-align: center; 
            padding: 2.5rem; 
            font-size: 0.75rem; 
            opacity: 0.8; 
            font-weight: 700;
            color: #2c3e50;
        }

        .toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #1a1d21; padding: 14px 28px; border-radius: 12px;
            font-family: 'Ubuntu', sans-serif; font-weight: 700; font-size: 0.9rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
        }
        .toast.show { bottom: 40px; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>HIRAYA LEGACY</h1>
        <h3>The Best Growtopia Private Server</h3>
    </header>

    <div class="card">
        <h3><i class="fas fa-plug"></i> CONNECT NOW</h3>
        <div class="btn-grid">
            <button class="btn" onclick="copyHost('Windows')">
                <i class="fab fa-windows"></i> Windows Host
            </button>
            <button class="btn" onclick="copyHost('MacOS')">
                <i class="fab fa-apple"></i> MacOS Host
            </button>
            <button class="btn" onclick="copyIOS()">
                <i class="fas fa-mobile-alt"></i> IOS Host (Surge 5)
            </button>
            <button class="btn btn-download" onclick="downloadHost()">
                <i class="fas fa-file-download"></i> Download VHOST
            </button>
            <button class="btn" onclick="copyPT()">
                <i class="fas fa-link"></i> PowerTunnel URL
            </button>
        </div>
    </div>

    <div class="card">
        <h3><i class="fab fa-discord"></i> COMMUNITY</h3>
        <div class="discord-container">
            <iframe src="https://discord.com/widget?id=1456996889420632246&theme=dark" width="100%" height="400" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
        </div>
    </div>

    <footer class="footer">
        HIRAYA LEGACY &copy; 2026 • ALL RIGHTS RESERVED
    </footer>
</div>

<div id="toast" class="toast">COPIED!</div>

<script>
    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
    }

    const SERVER_IP = "91.134.85.13";
    const HOST_CONTENT = `${SERVER_IP} growtopia1.com\n${SERVER_IP} growtopia2.com\n${SERVER_IP} www.growtopia1.com\n${SERVER_IP} www.growtopia2.com`;

    function copyHost(os) {
        navigator.clipboard.writeText(HOST_CONTENT).then(() => showToast(`${os} Host Copied!`));
    }

    function copyPT() {
        navigator.clipboard.writeText("https://dash.gtps.cloud/android/1848").then(() => showToast("PowerTunnel URL Copied!"));
    }

    function copyIOS() {
        navigator.clipboard.writeText("https://dash.gtps.cloud/ios/1848").then(() => showToast("IOS URL Copied!"));
    }

    function downloadHost() {
        const blob = new Blob([HOST_CONTENT], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "hosts.txt";
        a.click();
        showToast("VHOST Downloaded!");
    }
</script>

</body>
</html>
